services:
  editor:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${EDITOR_PORT:-3030}:3030"
    environment:
      - EDITOR_HOST=0.0.0.0
      - EDITOR_PORT=3030
      - EDITOR_DEBUG=${EDITOR_DEBUG:-false}
    volumes:
      # Mount the entire project so the container uses local files.
      # This lets another dev edit code/configs and see changes immediately.
      - .:/app
      # Mount AWS credentials and .env file for S3 deploy if available.
      - ${HOME:-~}/.aws:/root/.aws:ro
      - ./.env:/app/.env:ro
      # Mount the source-images folder. Set SOURCE_IMAGES to the absolute
      # path used in your config.json. It is mounted at the same path
      # inside the container so existing configs resolve correctly.
      - ${SOURCE_IMAGES:-./source-images}:${SOURCE_IMAGES:-/app/source-images}:ro
    working_dir: /app
    command: python -m expansions.editor.app
