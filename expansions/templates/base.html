<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>{% block title %}{{ config.name }} v{{ config.version }}{% endblock %}</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          bg: '#0f1117',
          panel: '#1a1d27',
          border: '#2d3148',
          muted: '#94a3b8',
          accent: '#3b82f6'
        }
      }
    }
  }
</script>
<link rel="stylesheet" href="assets/css/styles.css"/>
</head>
<body class="bg-bg text-gray-100 min-h-screen">
{% if site.banner_path %}
<div class="site-banner" style="background-image: url('{{ site.banner_path }}');"></div>
{% endif %}
<nav class="bg-panel border-b border-border sticky top-0 z-50">
  <div class="max-w-6xl mx-auto px-6 py-3 flex items-center gap-4">
    <a href="index.html" class="font-bold text-lg hover:text-accent">{{ config.name }}</a>
    <div class="flex-1 flex gap-2 overflow-x-auto">
      {% for sec in site.sections %}
      <a href="{{ sec.id }}.html" class="px-3 py-1 rounded-lg hover:bg-bg text-sm text-muted hover:text-gray-100 transition-colors">{{ sec.title }}</a>
      {% endfor %}
    </div>
    <a href="search.html" class="px-3 py-1 rounded-lg bg-accent text-white text-sm font-semibold hover:bg-blue-600">Search</a>
  </div>
</nav>
{% block body %}{% endblock %}
<footer class="max-w-6xl mx-auto px-6 py-6 text-sm text-muted border-t border-border mt-8">
  <div class="flex justify-between items-center">
    <span>{{ config.name }} v{{ config.version }}</span>
    <a href="data.json" download class="text-accent hover:underline">Download data.json</a>
  </div>
</footer>
<script src="assets/js/search.js"></script>
<script src="assets/js/filters.js"></script>
<script src="assets/js/ui.js"></script>
</body>
</html>
