<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Search | Monuments v3.1</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          bg: '#0f1117',
          panel: '#1a1d27',
          border: '#2d3148',
          muted: '#94a3b8',
          accent: '#3b82f6'
        }
      }
    }
  }
</script>
<link rel="stylesheet" href="assets/css/styles.css"/>
</head>
<body class="bg-bg text-gray-100 min-h-screen">

<nav class="bg-panel border-b border-border sticky top-0 z-50">
  <div class="max-w-6xl mx-auto px-6 py-3 flex items-center gap-4">
    <a href="index.html" class="font-bold text-lg hover:text-accent">Monuments</a>
    <div class="flex-1 flex gap-2 overflow-x-auto">
      
      <a href="overview.html" class="px-3 py-1 rounded-lg hover:bg-bg text-sm text-muted hover:text-gray-100 transition-colors">Overview</a>
      
      <a href="cards.html" class="px-3 py-1 rounded-lg hover:bg-bg text-sm text-muted hover:text-gray-100 transition-colors">Cards</a>
      
      <a href="faq.html" class="px-3 py-1 rounded-lg hover:bg-bg text-sm text-muted hover:text-gray-100 transition-colors">FAQ</a>
      
      <a href="design.html" class="px-3 py-1 rounded-lg hover:bg-bg text-sm text-muted hover:text-gray-100 transition-colors">Design Your Own</a>
      
    </div>
    <a href="search.html" class="px-3 py-1 rounded-lg bg-accent text-white text-sm font-semibold hover:bg-blue-600">Search</a>
  </div>
</nav>

<header class="bg-panel border-b border-border p-6">
  <div class="max-w-6xl mx-auto">
    <h1 class="text-3xl font-bold">Search</h1>
    <p class="text-muted mt-2">Search across Monuments sections and cards.</p>
  </div>
</header>

<main class="max-w-6xl mx-auto p-6 space-y-6">
  <div class="bg-panel border border-border rounded-xl p-4 shadow-lg flex items-center gap-3">
    <input id="search-input" type="text" placeholder="Search..."
           class="bg-bg border border-border rounded-lg px-4 py-2 w-full text-gray-100 focus:outline-none focus:border-accent"/>
    <button id="search-btn" class="bg-accent text-white px-4 py-2 rounded-lg font-semibold hover:bg-blue-600">Search</button>
  </div>

  <div id="search-results" class="hidden bg-panel border border-border rounded-xl p-6 shadow-lg">
    <h2 class="text-xl font-semibold mb-4">Results</h2>
    <ul id="search-results-list" class="space-y-2"></ul>
    <p id="search-no-results" class="hidden text-muted">No results found.</p>
  </div>
</main>

<script>
(async function() {
  await window.searchReady;
  const input = document.getElementById('search-input');
  const btn = document.getElementById('search-btn');
  const results = document.getElementById('search-results');
  const list = document.getElementById('search-results-list');
  const noResults = document.getElementById('search-no-results');

  function run() {
    const q = input.value.trim();
    const docs = window.searchExpansion(q);
    list.innerHTML = docs.map(d => `<li><a href="${d.url}" class="text-accent hover:underline">${d.title}</a> <span class="text-muted text-sm">(${d.kind})</span></li>`).join('');
    results.classList.remove('hidden');
    noResults.classList.toggle('hidden', docs.length > 0);
  }

  btn.addEventListener('click', run);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') run(); });
})();
</script>

<footer class="max-w-6xl mx-auto px-6 py-6 text-sm text-muted border-t border-border mt-8">
  <div class="flex justify-between items-center">
    <span>Monuments v3.1</span>
    <a href="data.json" download class="text-accent hover:underline">Download data.json</a>
  </div>
</footer>
<script src="assets/js/search.js"></script>
<script src="assets/js/filters.js"></script>
<script src="assets/js/ui.js"></script>
</body>
</html>
